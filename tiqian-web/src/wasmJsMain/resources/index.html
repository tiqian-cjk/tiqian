<!doctype html>
<html lang="zh-Hans">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>提椠 · Web 渲染 (ADR 0039)</title>
    <style>
        body { margin: 0; padding: 24px; background: #faf9f7; color: #1a1a1a;
               font-family: -apple-system, "PingFang SC", sans-serif; }
        h1 { font-size: 17px; font-weight: 600; }
        h1 .sub { color: #999; font-weight: 400; font-size: 13px; margin-left: 8px; }
    </style>
</head>
<body>
    <h1>提椠 · Web 渲染 <span class="sub">ADR 0039 · 真引擎 wasmJs 浏览器内布局</span></h1>
    <div id="app"></div>
    <script>
        // Source-faithful copy (ADR 0039 CopyTransparentSpacingSpans): the DOM shows
        // CLREQ display forms (——→⸺), but copy must yield the SOURCE. Swap each
        // substituted span's text back to its data-tq-src in a clone of the selection.
        document.addEventListener('copy', function (e) {
            var sel = window.getSelection();
            if (!sel || sel.isCollapsed || sel.rangeCount === 0) return;
            var frag = sel.getRangeAt(0).cloneContents();
            frag.querySelectorAll('[data-tq-src]').forEach(function (el) {
                el.textContent = el.getAttribute('data-tq-src');
            });
            var text = frag.textContent;
            if (text) { e.clipboardData.setData('text/plain', text); e.preventDefault(); }
        });
    </script>
    <script type="application/javascript" src="tiqian-web.js"></script>
</body>
</html>
